name: Run Backtest

on:
  repository_dispatch:
    types: [run_backtest]

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance supabase pandas numpy pyarrow requests
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BT_PARAMS: ${{ toJson(github.event.client_payload.params) }}
        run: python run_backtest.py
