name: NSE Momentum Screener — Live Run

# Trigger manually from the Actions tab in the GitHub GUI.
# Inputs let you supply today's portfolio valuation without editing files.
on:
  workflow_dispatch:
    inputs:
      total_portfolio_value:
        description: "Total Portfolio Value (Cash + Market Value of Holdings), in INR"
        required: true
        type: string
      unallocated_cash:
        description: "Unallocated Cash currently sitting idle (INR)"
        required: false
        default: "0"
        type: string
      max_universe_tickers:
        description: "Optional: cap universe size for testing (leave blank for full NSE universe)"
        required: false
        default: ""
        type: string

# Allow the workflow to commit the updated holdings.csv back to the repo
# and push the dashboard to gh-pages.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NSE Momentum Screener
        env:
          TOTAL_PORTFOLIO_VALUE: ${{ inputs.total_portfolio_value }}
          UNALLOCATED_CASH: ${{ inputs.unallocated_cash }}
          MAX_UNIVERSE_TICKERS: ${{ inputs.max_universe_tickers }}
        run: |
          python run_screener.py

      - name: Commit updated holdings.csv and screen results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add holdings.csv screen_results.csv portfolio_config.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated rebalance run: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy-pages:
    needs: run-screener
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
